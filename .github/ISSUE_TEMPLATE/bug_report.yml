name: Bug report
description: Something is broken in SELF OS Personal Intelligence (Community Edition)
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve **SELF OS Personal Intelligence**. Please do not include API keys, `.env` contents, or private backend URLs.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both
        - Docs / tooling only
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version (e.g. 0.1.0-community) or git SHA from GitHub
      placeholder: main @ abc1234
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Agents tab
        2. Tap Hello agent
        3. Send "hi"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logcat / Xcode output. Redact secrets.

  - type: checkboxes
    id: mock-only
    attributes:
      label: Scope check
      options:
        - label: This report is about Community Edition (mock mesh/wallet), not live SELF OS Core production services
          required: true
