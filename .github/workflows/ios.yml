name: iOS build

on:
  push:
    branches: [main]
    paths:
      - 'apps/self-shell-ios/**'
      - '.github/workflows/ios.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/self-shell-ios/**'
      - '.github/workflows/ios.yml'

jobs:
  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/self-shell-ios
    steps:
      - uses: actions/checkout@v4
      - name: Prepare Xcode simulators
        run: xcrun simctl list > /dev/null
      - name: Run unit tests
        run: |
          xcodebuild test \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build for iOS Simulator (Debug)
        run: |
          xcodebuild \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build for iOS Simulator (Release)
        run: |
          xcodebuild \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
