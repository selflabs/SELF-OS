name: iOS build

on:
  push:
    branches: [main]
    paths:
      - 'apps/self-shell-ios/**'
      - '.github/workflows/ios.yml'
      - '.github/workflows/release.yml'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths:
      - 'apps/self-shell-ios/**'
      - '.github/workflows/ios.yml'
      - '.github/workflows/release.yml'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

jobs:
  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/self-shell-ios
    steps:
      - uses: actions/checkout@v4
      - name: Select iOS Simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data.get('devices', {}).items():
              if 'iOS' not in runtime:
                  continue
              for device in devices:
                  if device.get('isAvailable') and 'iPhone' in device.get('name', ''):
                      print(device['udid'])
                      sys.exit(0)
          sys.exit(1)
          ")
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"
          xcrun simctl boot "$DEVICE_ID" 2>/dev/null || true
          xcrun simctl bootstatus "$DEVICE_ID" -b

      - name: Run tests
        run: |
          xcodebuild test \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.device_id }}" \
            -configuration Debug \
            -maximum-parallel-testing-workers 1 \
            -resultBundlePath TestResults.xcresult

      - name: Build for iOS Simulator (Debug)
        run: |
          xcodebuild \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Build for iOS Simulator (Release)
        run: |
          xcodebuild \
            -project SelfOSPI.xcodeproj \
            -scheme SelfOSPI \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            build
