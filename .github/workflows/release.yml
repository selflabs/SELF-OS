name: Release

on:
  push:
    tags:
      - 'v*-community'
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: >
          ./gradlew
          :agent-sdk:testDebugUnitTest
          :app-sdk:testDebugUnitTest
          :mock-aura-data:testDebugUnitTest
          :mock-harmony-mesh:testDebugUnitTest
          :mock-self-wallet:testDebugUnitTest
          :mock-app-store:testDebugUnitTest
          :self-shell:testDebugUnitTest
          --no-daemon --stacktrace

      - name: Build Android APKs
        run: ./gradlew :self-shell:assembleDebug :self-shell:assembleRelease --no-daemon --stacktrace

      - name: Prepare release artifacts
        run: |
          mkdir -p release-assets
          cp apps/self-shell/build/outputs/apk/debug/*.apk release-assets/selfos-pi-community-debug.apk
          cp apps/self-shell/build/outputs/apk/release/*.apk release-assets/selfos-pi-community-release.apk
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body_path: CHANGELOG.md
          files: |
            release-assets/selfos-pi-community-debug.apk
            release-assets/selfos-pi-community-release.apk
