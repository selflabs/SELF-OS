name: Android build

on:
  push:
    branches: [main]
    paths:
      - 'apps/self-shell/**'
      - 'sdk/**'
      - 'mock/**'
      - 'examples/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android.yml'
      - '.github/workflows/release.yml'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
  pull_request:
    branches: [main]
    paths:
      - 'apps/self-shell/**'
      - 'sdk/**'
      - 'mock/**'
      - 'examples/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradlew'
      - 'gradlew.bat'
      - '.github/workflows/android.yml'
      - '.github/workflows/release.yml'
      - 'docs/**'
      - 'DEVELOPMENT.md'
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        run: >
          ./gradlew
          :agent-sdk:testDebugUnitTest
          :mock-harmony-mesh:testDebugUnitTest
          :mock-self-wallet:testDebugUnitTest
          :mock-app-store:testDebugUnitTest
          :self-shell:testDebugUnitTest
          --no-daemon --stacktrace

      - name: Build Android debug
        run: ./gradlew :self-shell:assembleDebug --no-daemon --stacktrace

      - name: Build Android release (R8, unsigned store path)
        run: ./gradlew :self-shell:assembleRelease --no-daemon --stacktrace

      - name: Run launch smoke test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: >
            ./gradlew :self-shell:connectedDebugAndroidTest
            -Pandroid.testInstrumentationRunnerArguments.class=ai.selflabs.selfshell.LaunchSmokeTest
            --no-daemon --stacktrace
